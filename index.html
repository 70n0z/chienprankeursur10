<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie City Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; background: #000; color: white; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; }
        #health { font-size: 24px; color: lime; }
        #score { font-size: 20px; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: 2px solid red; border-radius: 50%; z-index: 100; pointer-events: none; display: none; }
        #leaderboard { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; max-height: 300px; overflow-y: auto; border-radius: 5px; }
        #instructions { position: absolute; bottom: 10px; left: 10px; font-size: 14px; opacity: 0.8; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
    <div id="ui">
        <div id="health">Vie: 100%</div>
        <div id="score">Zombies: 0 | Wins: 0 | Wave: 1</div>
    </div>
    <div id="crosshair"></div>
    <div id="leaderboard">
        <h3>🏆 Top 10</h3>
        <ul id="lb-list"></ul>
    </div>
    <div id="instructions">
        WASD: Bouger | Clic: Tir | F: Parry | Souris: Regard
    </div>

    <script>
        // === CONFIG JSONBIN (REMPLACE) ===
        const BIN_ID = '69b31e14c3097a1dd51dbe5e';  // Ex: yabc123def456
        const SECRET_KEY = '$2a$10$Lggm2f3BBHSU5Bfsn.0nwezYN0OXADYm8yZ1/7ZrY7PWKoa0nwAOC';  // De jsonbin.io
        const BASE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // État
        let scene, camera, renderer, controls;
        let player = { health: 100, zombiesKilled: 0, wins: 0, lastDamage: 0, powerup: null };
        let zombies = [], powerups = [], boss = null, waves = 1, gameOver = false, keys = {};
        let username = '';
        let regenTimer = 0;

        // Init
        function init() {
            // Pseudo
            username = prompt('Ton pseudo pour leaderboard ?') || 'Anonyme_' + Math.floor(Math.random()*10000);

            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x404040, 10, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, renderer.domElement);
            scene.add(controls.getObject());
            controls.getObject().position.set(0, 1.8, 0);

            renderer.domElement.addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => document.getElementById('crosshair').style.display = 'block');
            controls.addEventListener('unlock', () => document.getElementById('crosshair').style.display = 'none');

            // Lumières
            scene.add(new THREE.AmbientLight(0x404040, 0.4));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            createCity();
            loadLeaderboard();

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            renderer.domElement.addEventListener('click', shoot);
            window.addEventListener('resize', onResize);

            animate();
        }

        // Ville
        function createCity() {
            const citySize = 50;
            for (let x = -citySize; x < citySize; x += 10) {
                for (let z = -citySize; z < citySize; z += 10) {
                    const height = Math.random() * 8 + 3;
                    const building = new THREE.Mesh(
                        new THREE.BoxGeometry(9, height, 9),
                        new THREE.MeshLambertMaterial({ color: 0x444444 + Math.random() * 0x333333 })
                    );
                    building.position.set(x + 4.5, height / 2, z + 4.5);
                    building.castShadow = true;
                    building.receiveShadow = true;
                    scene.add(building);
                }
            }
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshLambertMaterial({ color: 0x222222 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        // Spawn zombie
        function spawnZombie() {
            const zombieGeo = new THREE.CapsuleGeometry(0.4, 1.4);
            const zombieMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });
            const zombie = new THREE.Mesh(zombieGeo, zombieMat);
            zombie.position.set(
                (Math.random() - 0.5) * 100,
                1,
                (Math.random() - 0.5) * 100
            );
            zombie.userData = { health: 40 + waves * 5, speed: 0.04 + waves * 0.005, meleeRange: 2.5, lastAttack: 0 };
            zombies.push(zombie);
            scene.add(zombie);
        }

        // Boss Chien Prankeur
        function spawnBoss() {
            const bossGeo = new THREE.SphereGeometry(1.2);
            const bossMat = new THREE.MeshLambertMaterial({ color: 0xff1493, emissive: 0x330033 });
            boss = new THREE.Mesh(bossGeo, bossMat);
            boss.position.set(0, 1.5, -60);
            boss.userData = { 
                health: 800, 
                speed: 0.025, 
                meleeRange: 3.5, 
                lastAttack: 0,
                dancing: true 
            };
            scene.add(boss);
        }

        // Power-up
        function spawnPowerup() {
            const types = ['health', 'speed', 'damage'];
            const powerup = new THREE.Mesh(
                new THREE.SphereGeometry(0.4),
                new THREE.MeshBasicMaterial({ 
                    color: {health: 0x00ff00, speed: 0x0000ff, damage: 0xff0000}[types[Math.floor(Math.random()*3)]],
                    emissive: 0x222222 
                })
            );
            powerup.position.set(
                (Math.random() - 0.5) * 80,
                0.5,
                (Math.random() - 0.5) * 80
            );
            powerup.userData.type = types[Math.floor(Math.random()*3)];
            powerups.push(powerup);
            scene.add(powerup);
        }

        // Tir
        function shoot() {
            if (!controls.isLocked) return;
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(zombies.concat(boss ? [boss] : []));
            if (intersects.length > 0) {
                const target = intersects[0].object;
                const dmg = player.powerup === 'damage' ? 120 : 60;
                target.userData.health -= dmg;
                if (target.userData.health <= 0) {
                    scene.remove(target);
                    zombies = zombies.filter(z => z !== target);
                    if (target === boss) {
                        player.wins++;
                        alert(`Boss VAINCU! Wins: ${player.wins}\nScore sauvé!`);
                        saveScore();
                        resetWave();
                    } else {
                        player.zombiesKilled++;
                    }
                    updateUI();
                }
            }
        }

        // Update zombies
        function updateZombies() {
            const playerPos = controls.getObject().position;
            for (let i = zombies.length - 1; i >= 0; i--) {
                const zombie = zombies[i];
                const dir = playerPos.clone().sub(zombie.position).normalize();
                zombie.position.add(dir.multiplyScalar(zombie.userData.speed));
                zombie.lookAt(playerPos);

                if (zombie.position.distanceTo(playerPos) < zombie.userData.meleeRange) {
                    const now = performance.now();
                    if (now - zombie.userData.lastAttack > 1200) {
                        player.health -= 12.5;  // 2 coups = 25%
                        player.lastDamage = now;
                        zombie.userData.lastAttack = now;
                        if (player.health <= 0) gameOver = true;
                        updateUI();
                    }
                }

                if (zombie.position.distanceTo(playerPos) > 120) {
                    scene.remove(zombie);
                    zombies.splice(i, 1);
                }
            }
        }

        // Update boss
        function updateBoss() {
            if (!boss) return;
            const playerPos = controls.getObject().position;
            const dir = playerPos.clone().sub(boss.position).normalize();
            boss.position.add(dir.multiplyScalar(boss.userData.speed));
            boss.lookAt(playerPos);
            if (boss.userData.dancing) {
                boss.rotation.y += 0.15;
                boss.rotation.x += 0.05 * Math.sin(performance.now() * 0.005);
            }

            if (boss.position.distanceTo(playerPos) < boss.userData.meleeRange) {
                const now = performance.now();
                if (now - boss.userData.lastAttack > 1800) {
                    player.health -= 25;
                    player.lastDamage = now;
                    boss.userData.lastAttack = now;
                    if (player.health <= 0) gameOver = true;
                    updateUI();
                }
            }
        }

        // Update powerups
        function updatePowerups() {
            const playerPos = controls.getObject().position;
            for (let i = powerups.length - 1; i >= 0; i--) {
                const pu = powerups[i];
                pu.rotation.y += 0.08;
                pu.position.y += Math.sin(performance.now() * 0.005 + i) * 0.01;

                if (pu.position.distanceTo(playerPos) < 2) {
                    const type = pu.userData.type;
                    if (type === 'health') player.health = Math.min(100, player.health + 30);
                    else if (type === 'speed') { player.powerup = 'speed'; setTimeout(() => player.powerup = null, 8000); }
                    else { player.powerup = 'damage'; setTimeout(() => player.powerup = null, 8000); }
                    scene.remove(pu);
                    powerups.splice(i, 1);
                    updateUI();
                }
            }
        }

        // Regen
        function updateRegen() {
            const now = performance.now();
            if (now - player.lastDamage > 7000) {
                player.health = Math.min(100, player.health + 0.2);
                updateUI();
            }
        }

        // Waves
        function updateWaves() {
            if (zombies.length < waves * 8) spawnZombie();
            if (Math.random() < 0.015) spawnPowerup();
            if (waves >= 8 && !boss) spawnBoss();
            if (zombies.length === 0 && waves > 1 && !boss) waves++;
            document.getElementById('score').textContent = `Zombies: ${player.zombiesKilled} | Wins: ${player.wins} | Wave: ${waves}`;
        }

        // UI
        function updateUI() {
            const healthEl = document.getElementById('health');
            healthEl.textContent = `Vie: ${Math.floor(player.health)}%`;
            healthEl.style.color = player.health > 50 ? 'lime' : player.health > 25 ? 'orange' : 'red';
        }

        // Inputs
        function onKeyDown(e) { keys[e.code] = true; }
        function onKeyUp(e) { keys[e.code] = false; }

        function updateMovement(delta) {
            const speed = (20 + (player.powerup === 'speed' ? 15 : 0)) * delta;
            const velocity = new THREE.Vector3();
            const direction = new THREE.Vector3();
            if (keys['KeyW']) direction.z -= 1;
            if (keys['KeyS']) direction.z += 1;
            if (keys['KeyA']) direction.x -= 1;
            if (keys['KeyD']) direction.x += 1;
            direction.normalize();
            if (keys['ShiftLeft']) speed *= 1.5;  // Sprint

            controls.moveForward(-direction.z * speed);
            controls.moveRight(direction.x * speed);

            // Parry F
            if (keys['KeyF']) {
                player.lastDamage = performance.now() - 7000;  // Force regen
            }
        }

        // Animate
        function animate() {
            requestAnimationFrame(animate);
            if (gameOver || !controls.isLocked) {
                renderer.render(scene, camera);
                return;
            }

            const delta = 0.016;
            updateMovement(delta);
            updateZombies();
            updateBoss();
            updatePowerups();
            updateRegen();
            updateWaves();
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // === LEADERBOARD ===
        async function apiCall(url, options = {}) {
            try {
                const res = await fetch(url, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': SECRET_KEY,
                        'Version-Key': 'latest'
                    }
                });
                return await res.json();
            } catch(e) {
                console.warn('JSONBin offline, mode local');
                return { record: [] };
            }
        }

        async function loadLeaderboard() {
            try {
                const data = await apiCall(`${BASE_URL}/latest`, { method: 'GET' });
                const lb = data.record || [];
                const list = document.getElementById('lb-list');
                list.innerHTML = '';
                lb.sort((a, b) => b.wins - a.wins || b.zombiesKilled - a.zombiesKilled)
                  .slice(0, 10).forEach((entry, i) => {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${i+1}. ${entry.username}</strong><br>${entry.wins} wins • ${entry.zombiesKilled} zombies`;
                    list.appendChild(li);
                });
            } catch(e) { console.error('LB fail', e); }
        }

        async function saveScore() {
            try {
                const data = await apiCall(`${BASE_URL}/latest`, { method: 'GET' });
                const lb = data.record || [];
                const entry = { username, zombiesKilled: player.zombiesKilled, wins: player.wins };
                const userIndex = lb.findIndex(u => u.username === username);
                if (userIndex > -1) {
                    lb[userIndex] = entry;
                } else {
                    lb.push(entry);
                }
                // Top 100 max
                lb.sort((a,b) => b.wins - a.wins || b.zombiesKilled - a.zombiesKilled).slice(0,100);
                
                await apiCall(BASE_URL, {
                    method: 'PUT',
                    body: JSON.stringify(lb)
                });
                loadLeaderboard();
            } catch(e) { console.log('Saved local only'); }
        }

        function resetWave() {
            waves = 1;
            zombies.forEach(z => scene.remove(z));
            zombies = [];
            if (boss) scene.remove(boss);
            boss = null;
        }

        // START
        init();
    </script>
</body>
</html>

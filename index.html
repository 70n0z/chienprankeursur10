<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Zombie City Shooter</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#000; color:#fff; font-family:'Courier New', monospace; }
canvas { display:block; }
#overlay {
    position:fixed; inset:0;
    background:linear-gradient(135deg,#0a0a1a,#1a0a2a);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:999;
}
#overlay h1 { font-size:52px; color:#ff0044; text-shadow:0 0 30px #ff0044; margin-bottom:10px; }
.controls-list { text-align:left; background:rgba(255,255,255,0.05); padding:15px 25px; border-radius:8px; margin-bottom:20px; }
.controls-list li { margin:5px 0; font-size:15px; }
#pseudo-input { padding:10px 20px; font-size:18px; border-radius:8px; border:2px solid #ff0044; background:#111; color:#fff; text-align:center; width:250px; }
#startBtn { margin-top:15px; padding:15px 50px; font-size:24px; background:#ff0044; color:#fff; border:none; border-radius:10px; cursor:pointer; }
#hud { position:fixed; bottom:20px; left:20px; display:none; z-index:100; pointer-events:none; }
#healthbar-bg { background:#333; border-radius:5px; height:20px; width:220px; border:2px solid #666; }
#healthbar { height:20px; width:100%; border-radius:5px; background:lime; transition:width 0.1s, background 0.1s; }
#ammo { font-size:22px; margin-top:6px; }
#stats-top { position:fixed; top:10px; left:50%; transform:translateX(-50%); font-size:17px; background:rgba(0,0,0,0.7); padding:6px 20px; border-radius:20px; display:none; z-index:100; pointer-events:none; }
#crosshair { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:100; display:none; width:24px; height:24px; }
#crosshair::before,#crosshair::after { content:''; position:absolute; background:red; }
#crosshair::before { width:2px; height:24px; top:-12px; left:11px; }
#crosshair::after { width:24px; height:2px; left:-1px; top:11px; }
#leaderboard { position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.9); padding:14px; border-radius:10px; font-size:13px; display:none; min-width:190px; z-index:100; border:1px solid #444; }
#leaderboard h3 { color:gold; margin-bottom:8px; font-size:16px; }
#wave-alert { position:fixed; top:35%; left:50%; transform:translateX(-50%); font-size:42px; font-weight:bold; display:none; pointer-events:none; z-index:200; text-shadow:3px 3px 12px #000; text-align:center; }
#powerup-msg { position:fixed; bottom:120px; left:50%; transform:translateX(-50%); font-size:22px; font-weight:bold; display:none; pointer-events:none; z-index:100; }
#parry-msg { position:fixed; top:42%; left:50%; transform:translateX(-50%); font-size:32px; color:#00ffff; font-weight:bold; display:none; pointer-events:none; z-index:100; }
#hit-flash { position:fixed; inset:0; background:transparent; pointer-events:none; z-index:300; transition:background 0.1s; }
#slide-msg { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); font-size:20px; color:#00aaff; display:none; pointer-events:none; z-index:100; }
#boss-hp-wrap { position:fixed; top:50px; left:50%; transform:translateX(-50%); width:400px; display:none; z-index:100; text-align:center; }
#boss-hp-label { font-size:16px; color:#ff00ff; margin-bottom:4px; text-shadow:0 0 10px #ff00ff; }
#boss-hp-bg { background:#333; border-radius:5px; height:20px; border:2px solid #ff00ff; }
#boss-hp-bar { height:20px; background:linear-gradient(90deg,#ff00ff,#ff0080); border-radius:5px; transition:width 0.1s; }
</style>
</head>
<body>

<div id="overlay">
    <h1>🧟 ZOMBIE CITY</h1>
    <ul class="controls-list">
        <li>🎮 WASD = Bouger | SHIFT = Sprint</li>
        <li>🖱️ Souris = Viser | Clic = Tirer</li>
        <li>⚡ C = Slide | 🛡️ F = Parry | 🔄 R = Recharger</li>
        <li>💊 Ramasse les gemmes = Power-up</li>
        <li>☠️ Wave 8+ : Boss Chien Prankeur</li>
    </ul>
    <input id="pseudo-input" placeholder="Ton pseudo..." maxlength="20">
    <button id="startBtn" onclick="startGame()">▶ JOUER</button>
</div>

<div id="hud">
    <div id="healthbar-bg"><div id="healthbar"></div></div>
    <div id="ammo">🔫 30 / 30</div>
</div>
<div id="stats-top"></div>
<div id="crosshair"></div>
<div id="wave-alert"></div>
<div id="powerup-msg"></div>
<div id="parry-msg">⚡ PARRY!</div>
<div id="slide-msg">💨 SLIDE!</div>
<div id="hit-flash"></div>
<div id="boss-hp-wrap">
    <div id="boss-hp-label">🐶 CHIEN PRANKEUR</div>
    <div id="boss-hp-bg"><div id="boss-hp-bar" style="width:100%"></div></div>
</div>
<div id="leaderboard"><h3>🏆 TOP 10</h3><div id="lb-content">Chargement...</div></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

const BIN_ID = '69b31e14c3097a1dd51dbe5e';
const SECRET_KEY = '$2a$10$Lggm2f3BBHSU5Bfsn.0nwezYN0OXADYm8yZ1/7ZrY7PWKoa0nwAOC';
const BASE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

let scene, camera, renderer, controls;
let zombies=[], powerupsObjs=[], boss=null, spells=[];
let buildings=[];
let wave=1, killed=0, wins=0;
let hp=100, lastDamage=0, activePowerup=null, powerupEnd=0;
let keys={}, locked=false, paused=false;
let username='Joueur';
let ammo=30, maxAmmo=30, reloading=false;
let sliding=false, slideEnd=0, slideDir=new THREE.Vector3();
let weaponGroup;
let parryActive=false, lastParry=0;
let lastTime=0;
let particles=[];

window.startGame = function() {
    const p = document.getElementById('pseudo-input').value.trim();
    if(p) username=p;
    document.getElementById('overlay').style.display='none';
    document.getElementById('hud').style.display='block';
    document.getElementById('stats-top').style.display='block';
    document.getElementById('crosshair').style.display='block';
    document.getElementById('leaderboard').style.display='block';
    renderer.domElement.requestPointerLock();
    paused=false;
};

function init() {
    // SCENE avec ciel visible
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a2a3a); // Bleu nuit visible
    scene.fog = new THREE.Fog(0x1a2a3a, 60, 200);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 500);
    camera.position.set(0, 2, 0);

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    controls = new PointerLockControls(camera, renderer.domElement);
    scene.add(controls.getObject());

    document.addEventListener('pointerlockchange', ()=>{
        locked = document.pointerLockElement===renderer.domElement;
        if(!locked && document.getElementById('overlay').style.display==='none'){
            paused=true;
            document.getElementById('overlay').innerHTML=`
                <h1 style="color:#ff0044">⏸ PAUSE</h1>
                <button onclick="window.resumeGame()" style="margin-top:20px;padding:15px 50px;font-size:24px;background:#ff0044;color:#fff;border:none;border-radius:10px;cursor:pointer;">▶ REPRENDRE</button>`;
            document.getElementById('overlay').style.display='flex';
        }
    });
    window.resumeGame=function(){
        document.getElementById('overlay').style.display='none';
        paused=false;
        renderer.domElement.requestPointerLock();
    };

    document.addEventListener('keydown', e=>{
        keys[e.code]=true;
        if(e.code==='KeyF'&&locked) doParry();
        if(e.code==='KeyC'&&locked&&!sliding) doSlide();
        if(e.code==='KeyR'&&locked&&!reloading) reload();
    });
    document.addEventListener('keyup', e=>keys[e.code]=false);
    document.addEventListener('mousedown', e=>{ if(locked&&e.button===0) shoot(); });
    window.addEventListener('resize', ()=>{
        camera.aspect=innerWidth/innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth,innerHeight);
    });

    // LUMIÈRES FORTES
    const ambLight = new THREE.AmbientLight(0xffffff, 1.5); // Très lumineux
    scene.add(ambLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
    dirLight.position.set(50, 80, 50);
    dirLight.castShadow=true;
    dirLight.shadow.mapSize.set(2048,2048);
    dirLight.shadow.camera.near=0.1; dirLight.shadow.camera.far=400;
    dirLight.shadow.camera.left=-150; dirLight.shadow.camera.right=150;
    dirLight.shadow.camera.top=150; dirLight.shadow.camera.bottom=-150;
    scene.add(dirLight);

    // Lumières de remplissage colorées
    const fillL = new THREE.HemisphereLight(0x4477ff, 0x224400, 0.8);
    scene.add(fillL);

    createCity();
    createWeapon();
    spawnInitialZombies();
    startPowerupSpawner();
    loadLeaderboard();
    setInterval(loadLeaderboard, 30000);
    animate();
}

function createCity() {
    // SOL bien visible
    const groundGeo = new THREE.PlaneGeometry(400,400,20,20);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI/2;
    ground.position.y = 0;
    ground.receiveShadow=true;
    scene.add(ground);

    // Lignes de route jaunes
    for(let i=-5;i<=5;i++){
        const rm = new THREE.MeshBasicMaterial({color:0xffff00});
        const rh = new THREE.Mesh(new THREE.PlaneGeometry(0.2,400),rm);
        rh.rotation.x=-Math.PI/2; rh.position.set(i*18,0.02,0); scene.add(rh);
        const rv = new THREE.Mesh(new THREE.PlaneGeometry(400,0.2),rm);
        rv.rotation.x=-Math.PI/2; rv.position.set(0,0.02,i*18); scene.add(rv);
    }

    // BÂTIMENTS avec couleurs variées et visibles
    const bColors=[0x4466aa,0x884422,0x228844,0x664488,0xaa6622,0x227788,0x882244,0x448822];
    for(let i=0;i<80;i++){
        const w=8+Math.random()*12;
        const h=8+Math.random()*30;
        const d=8+Math.random()*12;
        let px=(Math.random()-0.5)*160;
        let pz=(Math.random()-0.5)*160;
        if(Math.abs(px)<15&&Math.abs(pz)<15) continue;
        const col=bColors[Math.floor(Math.random()*bColors.length)];
        const building=new THREE.Mesh(
            new THREE.BoxGeometry(w,h,d),
            new THREE.MeshLambertMaterial({color:col})
        );
        building.position.set(px,h/2,pz);
        building.castShadow=true; building.receiveShadow=true;
        scene.add(building);
        buildings.push({x:px,z:pz,hw:w/2+0.8,hd:d/2+0.8});

        // Fenêtres lumineuses
        for(let j=0;j<6;j++){
            const winMesh=new THREE.Mesh(
                new THREE.PlaneGeometry(0.9,0.9),
                new THREE.MeshBasicMaterial({color:Math.random()>0.4?0xffff88:0x334455})
            );
            winMesh.position.set(px+(Math.random()-0.5)*w*0.7, h*0.3+Math.random()*h*0.5, pz+d/2+0.05);
            scene.add(winMesh);
        }
    }

    // Lampadaires
    for(let i=0;i<25;i++){
        const px=(Math.random()-0.5)*140, pz=(Math.random()-0.5)*140;
        const post=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,5,8), new THREE.MeshLambertMaterial({color:0xaaaaaa}));
        post.position.set(px,2.5,pz); scene.add(post);
        const arm=new THREE.Mesh(new THREE.BoxGeometry(1,0.1,0.1),new THREE.MeshLambertMaterial({color:0xaaaaaa}));
        arm.position.set(px+0.5,5.1,pz); scene.add(arm);
        const light=new THREE.PointLight(0xffffaa,1.5,20);
        light.position.set(px+1,5.1,pz); scene.add(light);
        const bulb=new THREE.Mesh(new THREE.SphereGeometry(0.15),new THREE.MeshBasicMaterial({color:0xffffcc}));
        bulb.position.set(px+1,5.1,pz); scene.add(bulb);
    }
}

// ARME VISIBLE
function createWeapon(){
    weaponGroup=new THREE.Group();
    // Corps
    const body=new THREE.Mesh(new THREE.BoxGeometry(0.09,0.15,0.38),new THREE.MeshLambertMaterial({color:0x222222}));
    weaponGroup.add(body);
    // Canon
    const barrel=new THREE.Mesh(new THREE.CylinderGeometry(0.024,0.024,0.5,8),new THREE.MeshLambertMaterial({color:0x111111}));
    barrel.rotation.x=Math.PI/2; barrel.position.set(0,0.03,-0.38);
    weaponGroup.add(barrel);
    // Crosse
    const grip=new THREE.Mesh(new THREE.BoxGeometry(0.075,0.2,0.11),new THREE.MeshLambertMaterial({color:0x1a1a1a}));
    grip.position.set(0,-0.16,0.09); grip.rotation.x=0.2; weaponGroup.add(grip);
    // Slide métallique
    const slide=new THREE.Mesh(new THREE.BoxGeometry(0.065,0.065,0.32),new THREE.MeshLambertMaterial({color:0x555555}));
    slide.position.set(0,0.07,-0.08); weaponGroup.add(slide);
    // Mire
    const sight=new THREE.Mesh(new THREE.BoxGeometry(0.035,0.045,0.035),new THREE.MeshLambertMaterial({color:0x333333}));
    sight.position.set(0,0.11,-0.08); weaponGroup.add(sight);
    // Lumière arme
    const wLight=new THREE.PointLight(0xffffff,0.5,1.5);
    wLight.position.set(0,0.1,-0.2); weaponGroup.add(wLight);

    weaponGroup.position.set(0.22,-0.2,-0.44);
    camera.add(weaponGroup);
    scene.add(camera);
}

// ZOMBIES GROS ET VISIBLES
function makeZombie(type='normal'){
    const group=new THREE.Group();

    if(type==='boss'){
        const body=new THREE.Mesh(new THREE.SphereGeometry(1.3,16,16),new THREE.MeshLambertMaterial({color:0xff00cc,emissive:0x440044}));
        group.add(body);
        const head=new THREE.Mesh(new THREE.BoxGeometry(1.0,1.0,1.0),new THREE.MeshLambertMaterial({color:0xff66cc,emissive:0x220022}));
        head.position.y=1.7; group.add(head);
        [-0.5,0.5].forEach(x=>{
            const ear=new THREE.Mesh(new THREE.ConeGeometry(0.22,0.6,8),new THREE.MeshLambertMaterial({color:0xff00cc}));
            ear.position.set(x,2.4,0); group.add(ear);
        });
        for(let i=0;i<4;i++){
            const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.15,0.8,8),new THREE.MeshLambertMaterial({color:0xcc0088}));
            const a=(i/4)*Math.PI*2;
            leg.position.set(Math.cos(a),-.9,Math.sin(a)); leg.name='leg_'+i; group.add(leg);
        }
        group.add(new THREE.PointLight(0xff00ff,3,12));
        group.userData={type:'boss',hp:800,maxHp:800,speed:0.03,range:3.5,lastAtk:0,atkCool:1400,dmg:25};
    }
    else if(type==='flying'){
        const body=new THREE.Mesh(new THREE.ConeGeometry(0.5,1.6,8),new THREE.MeshLambertMaterial({color:0x8800ff,emissive:0x330066,transparent:true,opacity:0.9}));
        group.add(body);
        const head=new THREE.Mesh(new THREE.SphereGeometry(0.4,8,8),new THREE.MeshLambertMaterial({color:0xaa44ff,emissive:0x220044}));
        head.position.y=1.1; group.add(head);
        [-0.12,0.12].forEach(x=>{
            const eye=new THREE.Mesh(new THREE.SphereGeometry(0.1),new THREE.MeshBasicMaterial({color:0xffffff}));
            eye.position.set(x,1.15,0.35); group.add(eye);
        });
        [-1,1].forEach(s=>{
            const wing=new THREE.Mesh(new THREE.PlaneGeometry(1.4,0.7),new THREE.MeshLambertMaterial({color:0x6600ff,transparent:true,opacity:0.8,side:THREE.DoubleSide}));
            wing.position.set(s*1.0,0.3,0); wing.rotation.y=s*0.4; wing.name='wing'; group.add(wing);
        });
        group.add(new THREE.PointLight(0x8800ff,2,8));
        group.userData={type:'flying',hp:35+wave*5,maxHp:35+wave*5,speed:0.05+wave*0.003,range:2,lastAtk:0,atkCool:1000,dmg:10,flyOffset:Math.random()*Math.PI*2};
    }
    else if(type==='mage'){
        const body=new THREE.Mesh(new THREE.CapsuleGeometry(0.42,1.3,4,8),new THREE.MeshLambertMaterial({color:0x0055aa,emissive:0x001133}));
        group.add(body);
        const head=new THREE.Mesh(new THREE.SphereGeometry(0.36,8,8),new THREE.MeshLambertMaterial({color:0x0077cc,emissive:0x001144}));
        head.position.y=1.2; group.add(head);
        const hat=new THREE.Mesh(new THREE.ConeGeometry(0.4,0.7,8),new THREE.MeshLambertMaterial({color:0x003388}));
        hat.position.y=1.7; group.add(hat);
        const staff=new THREE.Mesh(new THREE.CylinderGeometry(0.045,0.045,1.7,8),new THREE.MeshLambertMaterial({color:0x553300}));
        staff.position.set(0.45,0.2,0); group.add(staff);
        const orb=new THREE.Mesh(new THREE.SphereGeometry(0.18),new THREE.MeshBasicMaterial({color:0x00ccff}));
        orb.position.set(0.45,1.1,0); group.add(orb);
        const gl=new THREE.PointLight(0x00aaff,2,10); gl.position.set(0.45,1.1,0); group.add(gl);
        group.userData={type:'mage',hp:70+wave*8,maxHp:70+wave*8,speed:0.018,range:28,lastAtk:0,atkCool:2800,dmg:18};
    }
    else {
        // ZOMBIE NORMAL — grand et visible
        const torso=new THREE.Mesh(new THREE.BoxGeometry(0.8,1.1,0.45),new THREE.MeshLambertMaterial({color:0x336633,emissive:0x0a1a0a}));
        group.add(torso);
        const head=new THREE.Mesh(new THREE.BoxGeometry(0.65,0.65,0.65),new THREE.MeshLambertMaterial({color:0x558844,emissive:0x0a150a}));
        head.position.y=1.0; group.add(head);
        const jaw=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.18,0.3),new THREE.MeshLambertMaterial({color:0x446633}));
        jaw.position.set(0,-0.26,0.2); head.add(jaw);
        [-0.14,0.14].forEach(x=>{
            const eye=new THREE.Mesh(new THREE.SphereGeometry(0.09),new THREE.MeshBasicMaterial({color:0xff2200}));
            eye.position.set(x,0.08,0.3); head.add(eye);
        });
        [-0.48,0.48].forEach((x,i)=>{
            const arm=new THREE.Mesh(new THREE.CapsuleGeometry(0.12,0.75,4,8),new THREE.MeshLambertMaterial({color:0x446644}));
            arm.position.set(x,0.1,0); arm.rotation.z=(i===0?1:-1)*0.3; arm.name='arm'; group.add(arm);
        });
        [-0.22,0.22].forEach(x=>{
            const leg=new THREE.Mesh(new THREE.CapsuleGeometry(0.14,0.8,4,8),new THREE.MeshLambertMaterial({color:0x335533}));
            leg.position.set(x,-1.0,0); leg.name='leg'; group.add(leg);
        });
        group.userData={type:'normal',hp:45+wave*8,maxHp:45+wave*8,speed:0.035+wave*0.004,range:2.2,lastAtk:0,atkCool:1200,dmg:12.5};
    }

    // Barre de vie
    const barBg=new THREE.Mesh(new THREE.PlaneGeometry(1.2,0.14),new THREE.MeshBasicMaterial({color:0x330000,depthTest:false}));
    const barFill=new THREE.Mesh(new THREE.PlaneGeometry(1.2,0.14),new THREE.MeshBasicMaterial({color:type==='boss'?0xff00ff:type==='flying'?0xaa00ff:type==='mage'?0x0088ff:0xff2200,depthTest:false}));
    const barY=type==='boss'?3.5:type==='flying'?2.2:1.9;
    barBg.position.y=barY; barBg.renderOrder=999;
    barFill.position.set(0,barY,0.01); barFill.renderOrder=1000;
    group.userData.hpBarBg=barBg; group.userData.hpBar=barFill;
    group.add(barBg); group.add(barFill);
    return group;
}

function updateHpBar(e){
    const r=Math.max(0,e.userData.hp/e.userData.maxHp);
    e.userData.hpBar.scale.x=r; e.userData.hpBar.position.x=-(1-r)*0.6;
    e.userData.hpBarBg.lookAt(camera.position); e.userData.hpBar.lookAt(camera.position);
}

function spawnZombie(){
    const angle=Math.random()*Math.PI*2, dist=35+Math.random()*40;
    const roll=Math.random();
    const type=roll<0.2?'flying':roll<0.35?'mage':'normal';
    const z=makeZombie(type);
    z.position.set(
        camera.position.x+Math.cos(angle)*dist,
        type==='flying'?4+Math.random()*3:1.3,
        camera.position.z+Math.sin(angle)*dist
    );
    zombies.push(z); scene.add(z);
}

function spawnBoss(){
    boss=makeZombie('boss');
    boss.position.set(camera.position.x+25,1.8,camera.position.z-25);
    scene.add(boss);
    document.getElementById('boss-hp-wrap').style.display='block';
    showWaveAlert('🐶 CHIEN PRANKEUR ARRIVE !','#ff00ff');
}

function spawnInitialZombies(){ for(let i=0;i<12;i++) spawnZombie(); }

const PU=[
    {n:'health',c:0x00ff44,l:'💚 +40 HP'},
    {n:'speed',c:0x00aaff,l:'⚡ SPEED (10s)'},
    {n:'damage',c:0xff4400,l:'🔥 DAMAGE x3 (8s)'},
    {n:'regen',c:0xaaff00,l:'🌿 REGEN RAPIDE (12s)'},
    {n:'shield',c:0xffaa00,l:'🛡️ BOUCLIER (8s)'}
];
function spawnPowerup(){
    const t=PU[Math.floor(Math.random()*PU.length)];
    const pu=new THREE.Mesh(new THREE.OctahedronGeometry(0.6),new THREE.MeshBasicMaterial({color:t.c}));
    pu.add(new THREE.PointLight(t.c,3,8));
    pu.position.set((Math.random()-0.5)*80,0.8,(Math.random()-0.5)*80);
    pu.userData={type:t.n,label:t.l,color:t.c};
    powerupsObjs.push(pu); scene.add(pu);
    setTimeout(()=>{ scene.remove(pu); powerupsObjs=powerupsObjs.filter(p=>p!==pu); },18000);
}
function startPowerupSpawner(){
    for(let i=0;i<4;i++) spawnPowerup();
    setInterval(()=>{ if(powerupsObjs.length<6) spawnPowerup(); },5000);
}

function launchSpell(pos){
    const s=new THREE.Mesh(new THREE.SphereGeometry(0.25,8,8),new THREE.MeshBasicMaterial({color:0x00ccff}));
    s.position.set(pos.x,pos.y+1.1,pos.z);
    const dir=camera.position.clone().sub(s.position).normalize();
    s.userData={vel:dir.multiplyScalar(0.2),born:Date.now()};
    s.add(new THREE.PointLight(0x00aaff,2,6));
    spells.push(s); scene.add(s);
}

function shoot(){
    if(ammo<=0&&!reloading){reload();return;}
    if(reloading) return;
    ammo--; updateAmmoUI();
    weaponGroup.position.z+=0.06;
    setTimeout(()=>weaponGroup.position.z=-0.44,80);
    const flash=new THREE.PointLight(0xffaa00,8,4);
    const tip=new THREE.Vector3(0.22,-0.18,-0.8);
    camera.localToWorld(tip); flash.position.copy(tip);
    scene.add(flash); setTimeout(()=>scene.remove(flash),60);

    const ray=new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0),camera);
    const targets=zombies.concat(boss?[boss]:[]);
    const allMeshes=[];
    targets.forEach(t=>t.traverse(c=>{if(c.isMesh){c.userData._parent=t;allMeshes.push(c);}}));
    const hits=ray.intersectObjects(allMeshes,false);
    if(hits.length>0){
        let enemy=hits[0].object;
        while(enemy.parent&&!enemy.userData.type) enemy=enemy.parent;
        if(!enemy.userData.type) enemy=hits[0].object.userData._parent;
        const dmg=activePowerup==='damage'?180:60;
        enemy.userData.hp-=dmg;
        updateHpBar(enemy);
        spawnImpact(hits[0].point);
        if(enemy.userData.hp<=0) killEnemy(enemy);
    }
}

function spawnImpact(pos){
    for(let i=0;i<6;i++){
        const p=new THREE.Mesh(new THREE.SphereGeometry(0.08),new THREE.MeshBasicMaterial({color:0xff4400}));
        p.position.copy(pos);
        p.userData.v=new THREE.Vector3((Math.random()-0.5)*0.25,Math.random()*0.25,(Math.random()-0.5)*0.25);
        particles.push(p); scene.add(p);
        setTimeout(()=>{scene.remove(p);particles=particles.filter(x=>x!==p);},400);
    }
}

function killEnemy(enemy){
    for(let i=0;i<10;i++){
        const p=new THREE.Mesh(new THREE.SphereGeometry(0.12),new THREE.MeshBasicMaterial({color:enemy.userData.type==='boss'?0xff00ff:0x44ff00}));
        p.position.copy(enemy.position);
        p.userData.v=new THREE.Vector3((Math.random()-0.5)*0.35,Math.random()*0.4,(Math.random()-0.5)*0.35);
        particles.push(p); scene.add(p);
        setTimeout(()=>{scene.remove(p);particles=particles.filter(x=>x!==p);},500);
    }
    scene.remove(enemy);
    if(enemy===boss){
        boss=null; wins++;
        document.getElementById('boss-hp-wrap').style.display='none';
        onWin();
    } else {
        zombies=zombies.filter(z=>z!==enemy);
        killed++;
    }
    updateHUD();
}

function reload(){
    if(reloading||ammo===maxAmmo) return;
    reloading=true; updateAmmoUI();
    let t=0;
    const anim=setInterval(()=>{
        t++;
        weaponGroup.rotation.x=Math.sin(t/8)*0.4;
        if(t>18){clearInterval(anim);weaponGroup.rotation.x=0;ammo=maxAmmo;reloading=false;updateAmmoUI();}
    },50);
}

function doParry(){
    const now=Date.now();
    if(now-lastParry<2000) return;
    lastParry=now; parryActive=true;
    hp=Math.min(100,hp+10); lastDamage=now-7000;
    document.getElementById('parry-msg').style.display='block';
    setTimeout(()=>{document.getElementById('parry-msg').style.display='none';parryActive=false;},700);
    updateHUD();
}

function doSlide(){
    if(sliding) return;
    sliding=true;
    const dir=new THREE.Vector3();
    camera.getWorldDirection(dir); dir.y=0; dir.normalize();
    slideDir.copy(dir);
    document.getElementById('slide-msg').style.display='block';
    setTimeout(()=>{document.getElementById('slide-msg').style.display='none';sliding=false;},650);
}

function resolveCollisions(){
    const pp=controls.getObject().position;
    buildings.forEach(b=>{
        if(Math.abs(pp.x-b.x)<b.hw&&Math.abs(pp.z-b.z)<b.hd){
            const dx=pp.x-b.x, dz=pp.z-b.z;
            const ox=b.hw-Math.abs(dx), oz=b.hd-Math.abs(dz);
            if(ox<oz) pp.x+=dx>0?ox:-ox;
            else pp.z+=dz>0?oz:-oz;
        }
    });
    pp.y=2.0;
}

function updateMovement(delta){
    if(sliding){
        controls.getObject().position.addScaledVector(slideDir,22*delta);
    } else {
        const speed=(activePowerup==='speed'?18:9)*delta;
        const sprint=(keys['ShiftLeft']||keys['ShiftRight'])?1.7:1;
        if(keys['KeyW']) controls.moveForward(speed*sprint);
        if(keys['KeyS']) controls.moveForward(-speed*sprint);
        if(keys['KeyA']) controls.moveRight(-speed*sprint);
        if(keys['KeyD']) controls.moveRight(speed*sprint);
    }
    resolveCollisions();
}

function updateZombies(delta){
    const pp=controls.getObject().position;
    const t=Date.now();
    const all=zombies.concat(boss?[boss]:[]);
    all.forEach(enemy=>{
        const type=enemy.userData.type;
        const dist=enemy.position.distanceTo(pp);
        const dir=pp.clone().sub(enemy.position).normalize();

        if(type==='flying'){
            enemy.position.x+=dir.x*enemy.userData.speed;
            enemy.position.z+=dir.z*enemy.userData.speed;
            enemy.position.y=4+Math.sin(t*0.002+(enemy.userData.flyOffset||0))*1.5;
            enemy.children.filter(c=>c.name==='wing').forEach((w,i)=>{
                w.rotation.z=Math.sin(t*0.012)*(i===0?0.6:-0.6);
            });
        } else if(type==='mage'){
            if(dist>18){ enemy.position.x+=dir.x*enemy.userData.speed; enemy.position.z+=dir.z*enemy.userData.speed; }
            if(t-enemy.userData.lastAtk>enemy.userData.atkCool&&dist<30){
                launchSpell(enemy.position); enemy.userData.lastAtk=t;
            }
        } else if(type==='boss'){
            enemy.position.x+=dir.x*enemy.userData.speed;
            enemy.position.z+=dir.z*enemy.userData.speed;
            enemy.rotation.y=t*0.003;
            enemy.position.y=1.8+Math.sin(t*0.004)*0.4;
            const ratio=Math.max(0,enemy.userData.hp/enemy.userData.maxHp);
            document.getElementById('boss-hp-bar').style.width=(ratio*100)+'%';
        } else {
            enemy.position.x+=dir.x*enemy.userData.speed;
            enemy.position.z+=dir.z*enemy.userData.speed;
            const w=Math.sin(t*0.008);
            enemy.children.filter(c=>c.name==='leg').forEach((l,i)=>l.rotation.x=w*(i===0?.5:-.5));
            enemy.children.filter(c=>c.name==='arm').forEach((a,i)=>a.rotation.x=w*(i===0?-.4:.4));
        }

        enemy.lookAt(pp.x,enemy.position.y,pp.z);
        updateHpBar(enemy);

        if(type!=='mage'&&dist<enemy.userData.range){
            if(t-enemy.userData.lastAtk>enemy.userData.atkCool){
                if(activePowerup==='shield'){}
                else if(parryActive){
                    enemy.position.add(dir.clone().negate().multiplyScalar(4));
                    if(type!=='boss'){enemy.userData.hp-=40;updateHpBar(enemy);if(enemy.userData.hp<=0)killEnemy(enemy);}
                } else {
                    dealDamage(enemy.userData.dmg);
                }
                enemy.userData.lastAtk=t;
            }
        }
    });
}

function updateSpells(){
    const pp=controls.getObject().position;
    for(let i=spells.length-1;i>=0;i--){
        const s=spells[i];
        s.position.add(s.userData.vel);
        if(s.position.distanceTo(pp)<1.3){
            if(activePowerup!=='shield'&&!parryActive) dealDamage(18);
            scene.remove(s); spells.splice(i,1);
        } else if(Date.now()-s.userData.born>4000){
            scene.remove(s); spells.splice(i,1);
        }
    }
}

function dealDamage(dmg){
    hp-=dmg; lastDamage=Date.now();
    const f=document.getElementById('hit-flash');
    f.style.background='rgba(255,0,0,0.5)';
    setTimeout(()=>f.style.background='transparent',150);
    if(hp<=0) onDie();
    updateHUD();
}

function updatePowerups(){
    const pp=controls.getObject().position;
    const now=Date.now();
    if(activePowerup&&now>powerupEnd){activePowerup=null;document.getElementById('powerup-msg').style.display='none';}
    for(let i=powerupsObjs.length-1;i>=0;i--){
        const pu=powerupsObjs[i];
        pu.rotation.y+=0.05; pu.rotation.x+=0.025;
        pu.position.y=0.8+Math.sin(now*0.003+i)*0.3;
        if(pu.position.distanceTo(pp)<2.5){
            const t=pu.userData.type;
            if(t==='health') hp=Math.min(100,hp+40);
            else{activePowerup=t;powerupEnd=now+(t==='regen'?12000:8000);}
            scene.remove(pu); powerupsObjs.splice(i,1);
            const msg=document.getElementById('powerup-msg');
            msg.textContent=pu.userData.label;
            msg.style.color='#'+new THREE.Color(pu.userData.color).getHexString();
            msg.style.display='block';
            setTimeout(()=>msg.style.display='none',2500);
            updateHUD();
        }
    }
}

function updateRegen(){
    const now=Date.now();
    if(now-lastDamage>7000){ hp=Math.min(100,hp+(activePowerup==='regen'?0.4:0.15)); updateHUD(); }
}

function updateWeaponBob(){
    const moving=keys['KeyW']||keys['KeyS']||keys['KeyA']||keys['KeyD'];
    if(moving&&!sliding){
        weaponGroup.position.y=-0.2+Math.sin(Date.now()*0.009)*0.01;
        weaponGroup.rotation.z=Math.sin(Date.now()*0.009)*0.025;
    } else {
        weaponGroup.position.y+=-0.2-weaponGroup.position.y)*0.12;
        weaponGroup.rotation.z*=0.88;
    }
}

function updateParticles(){
    particles.forEach(p=>{
        p.position.add(p.userData.v);
        p.userData.v.y-=0.018;
    });
}

function checkWave(){
    if(!boss&&zombies.length<10+wave*5) spawnZombie();
    if(killed>0&&killed%40===0&&zombies.length===0&&!boss){
        wave++;
        showWaveAlert(`💀 WAVE ${wave} !`,'#ff4400');
        setTimeout(()=>{ for(let i=0;i<wave*3;i++) spawnZombie(); },1500);
    }
    if(wave>=8&&!boss&&killed>=40) spawnBoss();
}

function onWin(){
    showWaveAlert('🏆 BOSS VAINCU ! +1 WIN','#ffd700');
    saveScore();
    setTimeout(()=>{ wave++; for(let i=0;i<wave*3;i++) spawnZombie(); showWaveAlert(`💀 WAVE ${wave} — PLUS FORT !`,'#ff4400'); },5000);
}

function onDie(){
    hp=0; updateHUD(); locked=false; document.exitPointerLock(); saveScore();
    setTimeout(()=>{
        const r=confirm(`💀 MORT !\nZombies: ${killed} | Wins: ${wins} | Wave: ${wave}\n\nRecommencer ?`);
        if(r){
            hp=100;killed=0;wins=0;wave=1;
            zombies.forEach(z=>scene.remove(z)); zombies=[];
            spells.forEach(s=>scene.remove(s)); spells=[];
            if(boss){scene.remove(boss);boss=null;}
            document.getElementById('boss-hp-wrap').style.display='none';
            spawnInitialZombies(); updateHUD(); updateAmmoUI();
            renderer.domElement.requestPointerLock();
        }
    },300);
}

function showWaveAlert(text,color){
    const el=document.getElementById('wave-alert');
    el.textContent=text; el.style.color=color; el.style.display='block';
    setTimeout(()=>el.style.display='none',3000);
}

function updateHUD(){
    hp=Math.max(0,hp);
    const pct=Math.floor(hp);
    document.getElementById('healthbar').style.width=pct+'%';
    document.getElementById('healthbar').style.background=hp>60?'#00ff44':hp>30?'#ff8800':'#ff2200';
    document.getElementById('stats-top').textContent=
        `💀 ${killed} zombies | 🏆 ${wins} wins | 🌊 Wave ${wave}`+
        (activePowerup?` | ⚡ ${activePowerup.toUpperCase()}`:'')+(boss?' | 🐶 BOSS':'');
}

function updateAmmoUI(){
    document.getElementById('ammo').textContent=reloading?'🔄 RECHARGEMENT...':`🔫 ${ammo} / ${maxAmmo}`;
}

function animate(now=0){
    requestAnimationFrame(animate);
    const delta=Math.min((now-lastTime)/1000,0.05);
    lastTime=now;
    if(locked&&!paused){
        updateMovement(delta);
        updateZombies(delta);
        updateSpells();
        updatePowerups();
        updateRegen();
        updateWeaponBob();
        updateParticles();
        checkWave();
    }
    renderer.render(scene,camera);
}

async function apiCall(url,options={}){
    try{
        const res=await fetch(url,{...options,headers:{'Content-Type':'application/json','X-Master-Key':SECRET_KEY}});
        return await res.json();
    }catch(e){return{record:[]};}
}
async function loadLeaderboard(){
    const data=await apiCall(`${BASE_URL}/latest`,{method:'GET'});
    const lb=Array.isArray(data.record)?data.record:[];
    document.getElementById('lb-content').innerHTML=lb
        .sort((a,b)=>b.wins-a.wins||b.killed-a.killed).slice(0,10)
        .map((e,i)=>`<div style="padding:4px 0;border-bottom:1px solid #222;font-size:13px;">
            <b>${['🥇','🥈','🥉'][i]||i+1+'.'}${e.username}</b><br>🏆${e.wins}·💀${e.killed}
        </div>`).join('')||'<em style="color:#555">Personne encore !</em>';
}
async function saveScore(){
    const data=await apiCall(`${BASE_URL}/latest`,{method:'GET'});
    const lb=Array.isArray(data.record)?data.record:[];
    const idx=lb.findIndex(e=>e.username===username);
    const entry={username,wins,killed};
    if(idx>-1){if(wins>lb[idx].wins||(wins===lb[idx].wins&&killed>lb[idx].killed))lb[idx]=entry;}
    else lb.push(entry);
    lb.sort((a,b)=>b.wins-a.wins||b.killed-a.killed).splice(100);
    await apiCall(BASE_URL,{method:'PUT',body:JSON.stringify(lb)});
    loadLeaderboard();
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie City Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; background: #000; color: white; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 100; }
        #health { font-size: 24px; color: lime; }
        #score { font-size: 20px; }
        #login { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; display: block; }
        input, button { margin: 5px; padding: 10px; font-size: 16px; }
        #game { display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: 2px solid red; border-radius: 50%; z-index: 100; pointer-events: none; }
        #leaderboard { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; max-height: 300px; overflow-y: auto; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>
</head>
<body>
    <div id="ui">
        <div id="health">Vie: 100%</div>
        <div id="score">Zombies: 0 | Wins: 0</div>
    </div>
    <div id="crosshair"></div>
    <div id="leaderboard">
        <h3>Leaderboard</h3>
        <ul id="lb-list"></ul>
    </div>
    <div id="login">
        <h2>Login/Register</h2>
        <input id="username" placeholder="Pseudo" maxlength="20">
        <input id="password" type="password" placeholder="Mot de passe">
        <button onclick="login()">Login</button>
        <button onclick="register()">Register</button>
        <p id="login-msg"></p>
    </div>
    <div id="game"></div>

    <script>
        // Config JSONBin - REMPLACE !
        const BIN_ID = '69b31e14c3097a1dd51dbe5e'; // Ex: yabc123def
        const SECRET_KEY = '$2a$10$Lggm2f3BBHSU5Bfsn.0nwezYN0OXADYm8yZ1/7ZrY7PWKoa0nwAOC'; // Master Key de jsonbin.io
        const BASE_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

        // État jeu
        let scene, camera, renderer, controls;
        let player = { health: 100, zombiesKilled: 0, wins: 0, lastDamage: 0, powerup: null };
        let zombies = [], powerups = [], boss = null, waves = 1, gameOver = false, keys = {};
        let username = '', userData = null;
        let regenTimer = 0;

        // Init jeu
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x404040, 10, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('game').appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, renderer.domElement);
            scene.add(controls.getObject());
            controls.getObject().position.y = 1.8;

            document.getElementById('game').addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => document.getElementById('crosshair').style.display = 'block');
            controls.addEventListener('unlock', () => document.getElementById('crosshair').style.display = 'none');

            // Lumières
            const ambient = new THREE.AmbientLight(0x404040, 0.4);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(1, 1, 0);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Ville procédurale
            createCity();

            // Événements
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('click', shoot);
            window.addEventListener('resize', onResize);

            loadLeaderboard();
            animate();
        }

        // Ville
        function createCity() {
            const citySize = 50;
            for (let x = -citySize; x < citySize; x += 10) {
                for (let z = -citySize; z < citySize; z += 10) {
                    const height = Math.random() * 5 + 2;
                    const building = new THREE.Mesh(
                        new THREE.BoxGeometry(8, height, 8),
                        new THREE.MeshLambertMaterial({ color: 0x555555 + Math.random() * 0x222222 })
                    );
                    building.position.set(x + 5, height / 2, z + 5);
                    building.castShadow = true;
                    building.receiveShadow = true;
                    scene.add(building);
                }
            }
            // Sol
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshLambertMaterial({ color: 0x333333 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
        }

        // Zombies
        function spawnZombie() {
            const zombie = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.5, 1.5),
                new THREE.MeshLambertMaterial({ color: 0x00ff00 })
            );
            zombie.position.set(
                (Math.random() - 0.5) * 100,
                1,
                (Math.random() - 0.5) * 100
            );
            zombie.userData = { health: 50, speed: 0.05 + waves * 0.01, meleeRange: 2, lastAttack: 0 };
            zombies.push(zombie);
            scene.add(zombie);
        }

        // Boss Chien Prankeur
        function spawnBoss() {
            boss = new THREE.Mesh(
                new THREE.SphereGeometry(1.5), // Corps
                new THREE.MeshLambertMaterial({ color: 0xff00ff })
            );
            boss.position.set(0, 1.5, -50);
            boss.userData = { health: 500, speed: 0.03, meleeRange: 3, lastAttack: 0, dancing: true };
            scene.add(boss);
            // Danse : rotation
            boss.userData.danceAnim = () => { boss.rotation.y += 0.1; };
        }

        // Power-ups
        function spawnPowerup() {
            const powerup = new THREE.Mesh(
                new THREE.SphereGeometry(0.5),
                new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff, emissive: 0x222222 })
            );
            powerup.position.set(
                (Math.random() - 0.5) * 80,
                0.5,
                (Math.random() - 0.5) * 80
            );
            powerup.userData.type = ['speed', 'health', 'damage'][Math.floor(Math.random() * 3)];
            powerups.push(powerup);
            scene.add(powerup);
        }

        // Tir
        function shoot() {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(zombies.concat(boss ? [boss] : []));
            if (intersects.length > 0) {
                const target = intersects[0].object;
                target.userData.health -= player.powerup === 'damage' ? 100 : 50;
                if (target.userData.health <= 0) {
                    scene.remove(target);
                    zombies = zombies.filter(z => z !== target);
                    player.zombiesKilled++;
                    updateUI();
                    if (target === boss) {
                        player.wins++;
                        saveScore();
                        alert('Boss vaincu! Wins: ' + player.wins);
                        resetWave();
                    }
                }
            }
        }

        // Mise à jour zombies
        function updateZombies() {
            const playerPos = controls.getObject().position;
            zombies.forEach((zombie, i) => {
                const dir = playerPos.clone().sub(zombie.position).normalize();
                zombie.position.add(dir.multiplyScalar(zombie.userData.speed));

                // Rotation vers joueur
                zombie.lookAt(playerPos);

                // Corps à corps
                if (zombie.position.distanceTo(playerPos) < zombie.userData.meleeRange) {
                    const now = Date.now();
                    if (now - zombie.userData.lastAttack > 1000) {
                        player.health -= 12.5; // 2 coups = 25%
                        player.lastDamage = now;
                        zombie.userData.lastAttack = now;
                        updateUI();
                        if (player.health <= 0) gameOver = true;
                    }
                }

                // Suppr loin
                if (zombie.position.distanceTo(playerPos) > 100) {
                    scene.remove(zombie);
                    zombies.splice(i, 1);
                }
            });
        }

        // Boss
        function updateBoss() {
            if (!boss) return;
            const playerPos = controls.getObject().position;
            const dir = playerPos.clone().sub(boss.position).normalize();
            boss.position.add(dir.multiplyScalar(boss.userData.speed));
            boss.lookAt(playerPos);
            boss.userData.danceAnim();

            // Attaque
            if (boss.position.distanceTo(playerPos) < boss.userData.meleeRange) {
                const now = Date.now();
                if (now - boss.userData.lastAttack > 1500) {
                    player.health -= 20;
                    player.lastDamage = now;
                    boss.userData.lastAttack = now;
                    updateUI();
                    if (player.health <= 0) gameOver = true;
                }
            }
        }

        // Powerups
        function updatePowerups() {
            const playerPos = controls.getObject().position;
            powerups.forEach((pu, i) => {
                pu.rotation.y += 0.05;
                if (pu.position.distanceTo(playerPos) < 2) {
                    const type = pu.userData.type;
                    if (type === 'health') player.health = Math.min(100, player.health + 25);
                    else if (type === 'speed') player.powerup = 'speed'; setTimeout(() => player.powerup = null, 10000);
                    else player.powerup = 'damage'; setTimeout(() => player.powerup = null, 10000);
                    scene.remove(pu);
                    powerups.splice(i, 1);
                    updateUI();
                }
            });
        }

        // Regen vie
        function updateRegen() {
            const now = Date.now();
            if (now - player.lastDamage > 7000) {
                player.health = Math.min(100, player.health + 0.1);
                updateUI();
            }
        }

        // Ondes zombies
        function updateWaves() {
            if (zombies.length < waves * 10) spawnZombie();
            if (Math.random() < 0.01) spawnPowerup();
            if (waves > 10 && !boss) spawnBoss();
            if (zombies.length === 0 && waves > 1 && !boss) waves++;
        }

        // UI
        function updateUI() {
            document.getElementById('health').textContent = `Vie: ${Math.floor(player.health)}%`;
            document.getElementById('health').style.color = player.health > 50 ? 'lime' : player.health > 25 ? 'orange' : 'red';
            document.getElementById('score').textContent = `Zombies: ${player.zombiesKilled} | Wins: ${player.wins}`;
        }

        // Clés
        function onKeyDown(e) { keys[e.code] = true; }
        function onKeyUp(e) { keys[e.code] = false; }

        // Mouvement + Parry F
        function updateMovement(delta) {
            const speed = 20 + (player.powerup === 'speed' ? 10 : 0);
            const vel = new THREE.Vector3();
            if (keys['KeyW']) vel.z -= speed * delta;
            if (keys['KeyS']) vel.z += speed * delta;
            if (keys['KeyA']) vel.x -= speed * delta;
            if (keys['KeyD']) vel.x += speed * delta;
            controls.moveRight(vel.x * delta);
            controls.moveForward(-vel.z * delta);

            // Parry F
            if (keys['KeyF']) {
                // Réduit dégâts entrants pendant 1s (simulé par boost regen)
                player.lastDamage = Date.now() - 7000; // Force regen immédiate
            }
        }

        // Animate
        function animate() {
            requestAnimationFrame(animate);
            if (gameOver) return;

            const delta = 0.016; // ~60fps
            updateMovement(delta);
            updateZombies();
            updateBoss();
            updatePowerups();
            updateRegen();
            updateWaves();
            updateUI();

            renderer.render(scene, camera);
        }

        // Resize
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // JSONBin
        async function apiCall(url, options) {
            const res = await fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': SECRET_KEY,
                    'Version-Key': 'latest' // Optimistic concurrency
                }
            });
            return res.json();
        }

        async function loadLeaderboard() {
            try {
                const data = await apiCall(BASE_URL, { method: 'GET' });
                const lb = data.record || [];
                const list = document.getElementById('lb-list');
                list.innerHTML = '';
                lb.sort((a, b) => b.wins - a.wins || b.zombiesKilled - a.zombiesKilled)
                  .slice(0, 10).forEach(entry => {
                    const li = document.createElement('li');
                    li.textContent = `${entry.username}: ${entry.wins} wins, ${entry.zombiesKilled} zombies`;
                    list.appendChild(li);
                });
            } catch (e) { console.error('LB load fail', e); }
        }

        async function saveScore() {
            if (!username) return;
            try {
                const data = await apiCall(BASE_URL, { method: 'GET' });
                const lb = data.record || [];
                const userIndex = lb.findIndex(u => u.username === username);
                if (userIndex > -1) {
                    lb[userIndex] = { username, zombiesKilled: player.zombiesKilled, wins: player.wins };
                } else {
                    lb.push({ username, zombiesKilled: player.zombiesKilled, wins: player.wins });
                }
                await apiCall(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    body: JSON.stringify(lb)
                });
                loadLeaderboard();
            } catch (e) { console.error('Save fail', e); }
        }

        // Login/Register simple (stocké local pour démo, mais lié à score)
        async function register() {
            username = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (!username || !pass) return document.getElementById('login-msg').textContent = 'Remplis tout!';
            localStorage.setItem('user_' + username, pass); // Simple hash local
            document.getElementById('login-msg').textContent = 'Inscrit!';
            login();
        }

        function login() {
            username = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (!username || !pass) return document.getElementById('login-msg').textContent = 'Remplis tout!';
            if (localStorage.getItem('user_' + username) === pass) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('game').style.display = 'block';
                init();
            } else {
                document.getElementById('login-msg').textContent = 'Mauvais mot de passe!';
            }
        }

        function resetWave() {
            waves = 1;
            zombies = [];
            if (boss) scene.remove(boss);
            boss = null;
        }
    </script>
</body>
</html>
